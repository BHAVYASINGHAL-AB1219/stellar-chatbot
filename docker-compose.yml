# ============================================================
# NIT Sikkim College Chatbot — Docker Compose
# ============================================================
# The `chatbot-data` named volume persists the raw crawled data
# across container rebuilds and restarts. The Pinecone vector
# store is cloud-managed and needs no local volume.
#
# Usage:
#   1. Create your .env file:        cp .env.example .env
#   2. Build & run ingestion once:   docker compose run --rm chatbot python -m app.ingest
#   3. Start the API server:         docker compose up -d
#   4. Test:                         curl http://localhost:8000/health
#   5. Stop:                         docker compose down
# ============================================================

services:
  chatbot:
    build: .
    container_name: nitsikkim-chatbot
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persistent vector store + raw crawled data
      - chatbot-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  chatbot-data:

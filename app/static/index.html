<!DOCTYPE html>
<!-- Chat UI for NIT Sikkim Chatbot -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIT Sikkim Chatbot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface-2: #334155;
    --primary: #6366f1; --primary-hover: #818cf8;
    --text: #f1f5f9; --text-dim: #94a3b8; --border: #334155;
    --user-bubble: #6366f1; --bot-bubble: #1e293b;
    --success: #22c55e; --warning: #f59e0b;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh;
    display: flex; flex-direction: column;
  }
  header {
    background: var(--surface); padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  header .logo {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .subtitle { font-size: 12px; color: var(--text-dim); }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim); margin-left: auto;
  }
  #status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }

  #chat {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .message { display: flex; gap: 12px; max-width: 80%; animation: fadeIn 0.3s; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message .avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600;
  }
  .message.bot .avatar { background: var(--surface-2); }
  .message.user .avatar { background: var(--user-bubble); }
  .message .bubble {
    padding: 12px 16px; border-radius: 16px; line-height: 1.6;
    font-size: 14px; white-space: pre-wrap; word-wrap: break-word;
  }
  .message.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); }
  .message.user .bubble { background: var(--user-bubble); }
  .sources {
    margin-top: 8px; padding: 8px 12px; background: var(--surface);
    border-radius: 8px; font-size: 12px; color: var(--text-dim);
  }
  .sources a { color: var(--primary-hover); text-decoration: none; }
  .sources a:hover { text-decoration: underline; }
  .typing { display: inline-flex; gap: 4px; padding: 4px 0; }
  .typing span {
    width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim);
    animation: bounce 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  #input-area {
    background: var(--surface); padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; gap: 12px;
  }
  #question-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; color: var(--text);
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  #question-input:focus { border-color: var(--primary); }
  #question-input::placeholder { color: var(--text-dim); }
  #send-btn {
    background: var(--primary); color: white; border: none;
    border-radius: 12px; padding: 12px 24px; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: background 0.2s;
    white-space: nowrap;
  }
  #send-btn:hover { background: var(--primary-hover); }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }
  /* Scrollbar */
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
  <header>
    <div class="logo">N</div>
    <div>
      <h1>NIT Sikkim Assistant</h1>
      <div class="subtitle">Ask me anything about the college</div>
    </div>
    <div id="status-dot" title="Checking status..."></div>
  </header>

  <div id="chat">
    <div class="message bot">
      <div class="avatar">🤖</div>
      <div class="bubble">Hello! I'm the NIT Sikkim assistant. I can answer questions about admissions, courses, fees, hostels, placements, and more — based on the official college website. What would you like to know?</div>
    </div>
  </div>

  <div id="input-area">
    <input id="question-input" type="text" placeholder="Ask a question... (e.g. What is the B.Tech admission process?)" autocomplete="off" />
    <button id="send-btn">Send</button>
  </div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('question-input');
const sendBtn = document.getElementById('send-btn');
const statusDot = document.getElementById('status-dot');

// ---- Check health on load ----
fetch('/health').then(r => r.json()).then(data => {
  if (data.status === 'ok' && data.indexed_chunks > 0) {
    statusDot.classList.add('online');
    statusDot.title = `Online — ${data.indexed_chunks} chunks indexed`;
  } else if (data.indexed_chunks === 0) {
    statusDot.style.background = 'var(--warning)';
    statusDot.title = 'No data indexed yet — run ingestion first';
  } else {
    statusDot.title = 'Service status unknown';
  }
}).catch(() => { statusDot.title = 'Server unreachable'; });

// ---- Send message ----
let isStreaming = false;

async function sendMessage() {
  const question = input.value.trim();
  if (!question || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  input.value = '';

  // Add user message
  addMessage('user', question);

  // Add bot message placeholder with typing indicator
  const botMsg = addMessage('bot', '');
  const bubble = botMsg.querySelector('.bubble');
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  try {
    const response = await fetch('/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let answerText = '';
    let sources = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // Process complete SSE lines
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          if (parsed.error) {
            answerText += (answerText ? '\n\n' : '') + '⚠ ' + parsed.error;
            bubble.textContent = answerText;
          }
          if (parsed.token) {
            answerText += parsed.token;
            bubble.textContent = answerText;
            chat.scrollTop = chat.scrollHeight;
          }
          if (parsed.sources) {
            sources = parsed.sources;
          }
        } catch (e) { /* ignore parse errors */ }
      }
    }

    // Render sources
    if (sources && sources.length > 0) {
      const sourcesDiv = document.createElement('div');
      sourcesDiv.className = 'sources';
      const links = sources.map(s => {
        const label = s.page ? `${s.title} (p.${s.page})` : s.title;
        return `<a href="${s.url}" target="_blank">[${s.id}] ${label}</a>`;
      }).join(' &nbsp; ');
      sourcesDiv.innerHTML = `📚 Sources: ${links}`;
      botMsg.appendChild(sourcesDiv);
    }
  } catch (err) {
    bubble.textContent = '⚠ Error: Could not reach the server. Is it running on port 8000?';
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '🧑' : '🤖'}</div>
    <div class="bubble">${escapeHtml(text)}</div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---- Event listeners ----
sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
input.focus();
</script>
</body>
</html>
